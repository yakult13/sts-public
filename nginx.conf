worker_processes auto;
events {}

http {
    # --------------------
    # Common proxy headers (Cloud Run safe)
    # --------------------
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # --------------------
    # BACKEND POOL + HEALTH CHECK
    # --------------------
    upstream cloudrun_backends {
        # If a backend fails 3 times in 10s → temporarily removed
        server server-ip:server-ws-port max_fails=3 fail_timeout=10s;
        server server-ip:server-ws-port max_fails=3 fail_timeout=10s;
        server server-ip:server-ws-port max_fails=3 fail_timeout=10s;

        keepalive 32;
    }

    server {
        listen 8080;

        location / {
            proxy_pass http://cloudrun_backends;
        }

         # Route /vless to local Xray instance
        location /your-vless-path {
            proxy_pass http://server-ip/server-vless-path;  # Xray WS inbound port
             proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # Route /vmess to another local port
        location /your-vmess-path {
            proxy_pass http://server-ip/server-vmess-path;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
